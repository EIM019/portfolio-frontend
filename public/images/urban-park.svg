<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Urban Park project preview</title>
  <desc id="desc">A stylized parking management dashboard preview with site metrics and parking bay tiles.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7fbfa"/>
      <stop offset="55%" stop-color="#dfeceb"/>
      <stop offset="100%" stop-color="#f3eadc"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#163247"/>
      <stop offset="100%" stop-color="#244d64"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="88" y="76" width="1024" height="568" rx="34" fill="#ffffff" opacity="0.95"/>
