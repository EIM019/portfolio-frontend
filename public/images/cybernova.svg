    <circle cx="170" cy="170" r="92" fill="none" stroke="#00e7ff" stroke-width="2" opacity="0.55"/>
    <path d="M170 62 240 96v66c0 66-42 112-70 126-28-14-70-60-70-126V96z" fill="#07303d" stroke="#00e7ff" stroke-width="4"/>
