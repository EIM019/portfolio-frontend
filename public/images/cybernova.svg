<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Cybernova project preview</title>
  <desc id="desc">A stylized cyber security dashboard with threat signals, grid lines, and a risk assessment panel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#071323"/>
      <stop offset="58%" stop-color="#092331"/>
      <stop offset="100%" stop-color="#0d1025"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" x2="1">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#7dfcff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <g opacity="0.22" stroke="#1ee7f2" stroke-width="1">
    <path d="M0 80H1200M0 140H1200M0 200H1200M0 260H1200M0 320H1200M0 380H1200M0 440H1200M0 500H1200M0 560H1200M0 620H1200"/>
